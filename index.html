<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PZ CHAT</title>
    <style>
        :root { --primary: #7d5fff; --bg: #000; --card: #1c1c1e; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; overflow: hidden; }
        
        /* Auth Screen */
        .auth-container { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; padding: 40px; text-align: center; }
        .hidden { display: none !important; }
        
        .logo { font-size: 40px; font-weight: 800; margin-bottom: 10px; background: linear-gradient(45deg, #7d5fff, #ff4dff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sub-logo { color: #8e8e93; font-size: 14px; margin-bottom: 40px; letter-spacing: 2px; }
        
        input { background: #2c2c2e; border: 1px solid #3a3a3c; padding: 16px; border-radius: 12px; color: #fff; margin-bottom: 12px; width: 100%; box-sizing: border-box; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        
        .btn-main { background: var(--primary); color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-link { color: var(--primary); font-size: 14px; margin-top: 25px; cursor: pointer; }

        /* Main App Layout */
        .app-layout { height: 100vh; display: flex; flex-direction: column; }
        .nav-header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2c2c2e; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
        
        .search-section { padding: 15px; }
        .search-input { margin-bottom: 5px; background: #1c1c1e; }
        
        .list-container { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .user-item { display: flex; align-items: center; padding: 15px 20px; transition: 0.2s; }
        .user-item:active { background: #1c1c1e; }
        
        .avatar { width: 55px; height: 55px; background: linear-gradient(45deg, #7d5fff, #32ff7e); border-radius: 20px; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; color: #000; }
        .online-status { width: 14px; height: 14px; background: #4cd964; border-radius: 50%; border: 3px solid #000; margin-left: -28px; margin-top: 38px; z-index: 10; }
        
        .user-info { flex: 1; }
        .user-info b { font-size: 17px; display: block; margin-bottom: 2px; }
        .user-info p { margin: 0; color: #8e8e93; font-size: 13px; }

        .tab-bar { position: fixed; bottom: 0; width: 100%; display: flex; border-top: 1px solid #2c2c2e; padding: 10px 0 25px 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); }
        .tab-item { flex: 1; text-align: center; color: #8e8e93; font-size: 10px; font-weight: 500; }
        .tab-item.active { color: var(--primary); }
        .tab-icon { font-size: 22px; margin-bottom: 4px; display: block; }
    </style>
</head>
<body>

    <div id="auth-box" class="auth-container">
        <div class="logo">PZ CHAT</div>
        <div class="sub-logo">CONNECTION V3</div>
        
        <div id="login-form">
            <input type="text" id="l-user" placeholder="@username">
            <input type="password" id="l-pass" placeholder="Password">
            <button class="btn-main" onclick="doLogin()">SIGN IN</button>
            <div class="btn-link" onclick="viewSwitch(true)">New account? Register</div>
        </div>

        <div id="reg-form" class="hidden">
            <input type="text" id="r-user" placeholder="@name (Example: @dinphun)">
            <input type="password" id="r-pass" placeholder="Create Password">
            <button class="btn-main" onclick="doRegister()">CREATE ACCOUNT</button>
            <div class="btn-link" onclick="viewSwitch(false)">Already have account? Login</div>
        </div>
    </div>

    <div id="pz-app" class="app-layout hidden">
        <div class="nav-header">
            <h2 style="margin:0; font-size: 24px;">Messages</h2>
            <div id="my-id" style="color: var(--primary); font-weight: bold; font-size: 14px;"></div>
        </div>

        <div class="search-section">
            <input type="text" id="find-box" class="search-input" placeholder="Search @username..." onkeyup="findUser(this.value)">
            <div id="search-pop"></div>
        </div>

        <div class="list-container" id="chat-list">
            <div style="text-align: center; margin-top: 50px; color: #444;">
                <p>No friends yet.</p>
                <p style="font-size: 12px;">Search for @name to start chatting</p>
            </div>
        </div>

        <nav class="tab-bar">
            <div class="tab-item active"><span class="tab-icon">💬</span>CHATS</div>
            <div class="tab-item"><span class="tab-icon">👥</span>PEOPLE</div>
            <div class="tab-item" onclick="location.reload()"><span class="tab-icon">🚪</span>EXIT</div>
        </nav>
    </div>

    <script>
        let me = null;

        function viewSwitch(isReg) {
            document.getElementById('login-form').classList.toggle('hidden', isReg);
            document.getElementById('reg-form').classList.toggle('hidden', !isReg);
            document.querySelector('.logo').innerText = isReg ? "REGISTER" : "PZ CHAT";
        }

        function doRegister() {
            const u = document.getElementById('r-user').value.trim();
            const p = document.getElementById('r-pass').value.trim();

            if (!u.startsWith('@') || u.length < 3) {
                alert("Tên phải bắt đầu bằng dấu @");
                return;
            }
            if (p.length < 4) {
                alert("Mật khẩu quá ngắn!");
                return;
            }

            let db = JSON.parse(localStorage.getItem('pz_db') || "{}");
            if (db[u]) { alert("Tài khoản đã tồn tại!"); return; }

            db[u] = { pass: p, friends: [] };
            localStorage.setItem('pz_db', JSON.stringify(db));
            alert("Đăng ký PZ Chat thành công!");
            viewSwitch(false);
        }

        function doLogin() {
            const u = document.getElementById('l-user').value.trim();
            const p = document.getElementById('l-pass').value.trim();
            let db = JSON.parse(localStorage.getItem('pz_db') || "{}");

            if (db[u] && db[u].pass === p) {
                me = u;
                document.getElementById('auth-box').classList.add('hidden');
                document.getElementById('pz-app').classList.remove('hidden');
                document.getElementById('my-id').innerText = u;
                renderFriends();
            } else {
                alert("Sai tài khoản hoặc mật khẩu!");
            }
        }

        function findUser(val) {
            const pop = document.getElementById('search-pop');
            if (val.length < 2) { pop.innerHTML = ""; return; }

            let db = JSON.parse(localStorage.getItem('pz_db') || "{}");
            if (db[val] && val !== me) {
                pop.innerHTML = `
                    <div class="user-item" style="background: #1c1c1e; border-radius: 15px; margin-top:10px;">
                        <div class="avatar">${val[1].toUpperCase()}</div>
                        <div class="user-info"><b>${val}</b><p>PZ Chat User</p></div>
                        <button onclick="addContact('${val}')" style="background:var(--primary); color:#fff; border:none; padding:8px 15px; border-radius:8px; font-weight:bold;">ADD</button>
                    </div>`;
            } else {
                pop.innerHTML = "";
            }
        }

        function addContact(target) {
            let db = JSON.parse(localStorage.getItem('pz_db') || "{}");
            if (!db[me].friends.includes(target)) {
                db[me].friends.push(target);
                db[target].friends.push(me); 
                localStorage.setItem('pz_db', JSON.stringify(db));
                alert("Đã kết bạn với " + target);
                document.getElementById('find-box').value = "";
                document.getElementById('search-pop').innerHTML = "";
                renderFriends();
            }
        }

        function renderFriends() {
            let db = JSON.parse(localStorage.getItem('pz_db') || "{}");
            const list = document.getElementById('chat-list');
            const myFriends = db[me].friends;

            if (myFriends.length === 0) return;

            list.innerHTML = myFriends.map(f => `
                <div class="user-item" onclick="alert('Chat server đang bảo trì!')">
                    <div class="avatar">${f[1].toUpperCase()}</div>
                    <div class="online-status"></div>
                    <div class="user-info">
                        <b>${f}</b>
                        <p>Nhấn để gửi tin nhắn cho ${f}...</p>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
