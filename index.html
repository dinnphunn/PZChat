<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PZ CHAT</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #a033ff; --bg: #000; --card: #1c1c1e; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; overflow: hidden; }
        .hidden { display: none !important; }
        input { background: #2c2c2e; border: 1px solid #3a3a3c; padding: 16px; border-radius: 12px; color: #fff; width: 100%; box-sizing: border-box; outline: none; }
        .btn { background: var(--primary); color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; }
        
        /* Auth */
        .auth { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; padding: 40px; text-align: center; }
        
        /* Main */
        .app-layout { height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 15px 20px; border-bottom: 1px solid #2c2c2e; display: flex; justify-content: space-between; align-items: center; }
        .friend-item { padding: 15px; background: var(--card); border-radius: 15px; margin-bottom: 10px; display: flex; align-items: center; }

        /* Chat Window */
        #chat-window { position: fixed; inset: 0; background: #000; z-index: 900; display: flex; flex-direction: column; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        .msg { margin-bottom: 8px; padding: 10px 15px; border-radius: 18px; max-width: 75%; font-size: 15px; line-height: 1.4; }
        .msg.me { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .msg.them { align-self: flex-start; background: #2c2c2e; color: white; border-bottom-left-radius: 4px; }
        .input-area { padding: 10px 15px 30px; display: flex; gap: 10px; border-top: 1px solid #2c2c2e; }
    </style>
</head>
<body>

    <div id="auth-box" class="auth">
        <h1 style="font-size: 32px; letter-spacing: 2px;">PZ CHAT</h1>
        <p style="color: #888; margin-bottom: 30px;">Nhập @username để bắt đầu</p>
        <input type="text" id="u-name" placeholder="@ten_cua_ban" style="margin-bottom: 15px;">
        <button class="btn" onclick="login()">VÀO APP</button>
    </div>

    <div id="main-app" class="app-layout hidden">
        <div class="header">
            <h2 id="display-me" style="margin:0; color: var(--primary);"></h2>
        </div>
        <div style="padding: 15px;">
            <input type="text" id="find-user" placeholder="Tìm @username của bạn bè..." onkeyup="search(this.value)">
            <div id="search-res" style="margin-top: 10px;"></div>
            <div id="list" style="margin-top: 20px;"></div>
        </div>
    </div>

    <div id="chat-window" class="hidden">
        <div class="header">
            <button onclick="closeChat()" style="background:none; border:none; color:var(--primary); font-size:18px; font-weight:bold;">❮ Thoát</button>
            <b id="chat-with"></b>
            <div style="width:50px;"></div>
        </div>
        <div id="chat-box" class="chat-messages"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Aa..." onkeypress="if(event.key==='Enter')send()">
            <button onclick="send()" style="background:var(--primary); border:none; color:#fff; padding:0 20px; border-radius:12px; font-weight:bold;">Gửi</button>
        </div>
    </div>

    <script>
        const conf = { databaseURL: "https://pz-chat-f22e1-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(conf);
        const rtdb = firebase.database();
        let me = ""; let talkingTo = "";

        function login() {
            me = document.getElementById('u-name').value.trim();
            if(!me.startsWith('@') || me.length < 3) return alert("Tên phải bắt đầu bằng @");
            document.getElementById('auth-box').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('display-me').innerText = me;
            loadFriends();
        }

        function search(v) {
            if(v.length < 2 || v === me) { document.getElementById('search-res').innerHTML = ""; return; }
            document.getElementById('search-res').innerHTML = `<button class="btn" style="padding:10px; font-size:14px;" onclick="addFriend('${v}')">Thêm bạn ${v}</button>`;
        }

        function addFriend(n) {
            rtdb.ref('users/'+me+'/friends/'+n).set(true);
            rtdb.ref('users/'+n+'/friends/'+me).set(true);
            document.getElementById('find-user').value = "";
            document.getElementById('search-res').innerHTML = "";
        }

        function loadFriends() {
            rtdb.ref('users/'+me+'/friends').on('value', s => {
                const div = document.getElementById('list'); div.innerHTML = "<h4>Bạn bè:</h4>";
                s.forEach(c => {
                    div.innerHTML += `<div class="friend-item" onclick="openChat('${c.key}')">
                        <div style="width:40px; height:40px; background:var(--primary); border-radius:10px; margin-right:12px;"></div>
                        <b>${c.key}</b>
                    </div>`;
                });
            });
        }

        function openChat(n) {
            talkingTo = n;
            document.getElementById('chat-with').innerText = n;
            document.getElementById('chat-window').classList.remove('hidden');
            const id = [me, talkingTo].sort().join('_');
            rtdb.ref('chats/'+id).on('value', s => {
                const b = document.getElementById('chat-box'); b.innerHTML = "";
                s.forEach(c => {
                    const d = c.val();
                    b.innerHTML += `<div class="msg ${d.s===me?'me':'them'}">${d.t}</div>`;
                });
                b.scrollTop = b.scrollHeight;
            });
        }

        function send() {
            const t = document.getElementById('msg-input').value;
            if(!t) return;
            const id = [me, talkingTo].sort().join('_');
            rtdb.ref('chats/'+id).push({ s: me, t: t });
            document.getElementById('msg-input').value = "";
        }

        function closeChat() { document.getElementById('chat-window').classList.add('hidden'); }
    </script>
</body>
</html>
