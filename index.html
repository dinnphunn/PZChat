<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PZ Messenger V20 - Final</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #0084ff; --bg: #000; --text: #fff; --gray: #242526; --sec-text: #b0b3b8; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 0; overflow: hidden; }
        .hidden { display: none !important; }
        .header { padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 100; border-bottom: 0.5px solid #222; }
        .header h1 { font-size: 24px; font-weight: 800; margin: 0; }
        .circle-btn { width: 36px; height: 36px; background: var(--gray); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; color: white; cursor: pointer; }
        .tabs { display: flex; background: #000; border-bottom: 0.5px solid #222; }
        .tab { flex: 1; padding: 12px; text-align: center; color: var(--sec-text); font-weight: 600; font-size: 13px; cursor: pointer; position: relative; }
        .tab.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
        .badge { position: absolute; top: 5px; right: 5px; background: #ff4444; color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; display: none; }
        .has-notif .badge { display: block; }
        .list-container { height: calc(100vh - 160px); overflow-y: auto; }
        .chat-item { display: flex; align-items: center; padding: 12px 16px; position: relative; cursor: pointer; }
        .avatar { width: 52px; height: 52px; border-radius: 50%; background: #3a3b3c; margin-right: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; position: relative; font-size: 20px; }
        .online-dot { width: 14px; height: 14px; background: #31a24c; border: 3px solid #000; border-radius: 50%; position: absolute; bottom: 2px; right: 2px; display: none; }
        .is-online .online-dot { display: block; }
        .chat-info { flex: 1; border-bottom: 0.5px solid #1c1c1c; padding-bottom: 12px; }
        #chat-window { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; }
        .messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        .msg-row { display: flex; flex-direction: column; margin-bottom: 8px; max-width: 75%; }
        .msg-row.me { align-self: flex-end; align-items: flex-end; }
        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 15px; cursor: pointer; }
        .me .bubble { background: var(--primary); color: white; }
        .them .bubble { background: #303030; color: white; }
        .rec-status { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(255,0,0,0.8); color: white; padding: 5px 15px; border-radius: 20px; font-size: 13px; z-index: 100; font-weight: bold; }
        .overlay-box { position: absolute; background: #242526; padding: 16px; border-radius: 15px; width: 260px; z-index: 1100; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        #settings-main { top: 60px; right: 16px; }
        #settings-chat { top: 60px; right: 10px; }
        .color-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 10px; }
        .color-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid #fff; }
        .input-bar { padding: 10px 15px 35px; display: flex; align-items: center; gap: 12px; background: #000; border-top: 0.5px solid #222; position: relative; }
        .input-bar input { flex: 1; background: #242526; border: none; padding: 10px 15px; border-radius: 20px; color: white; outline: none; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: #555; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #31a24c; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>

    <div id="auth-box" style="position:fixed;inset:0;background:#000;z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;">
        <h1>PZ Messenger</h1>
        <input type="text" id="u-name" placeholder="@username" style="width:100%;padding:15px;margin-bottom:10px;border-radius:12px;background:#222;color:white;border:none;">
        <input type="password" id="u-pass" placeholder="Mật khẩu" style="width:100%;padding:15px;margin-bottom:20px;border-radius:12px;background:#222;color:white;border:none;">
        <button onclick="login()" style="width:100%;padding:15px;border-radius:12px;background:#0084ff;color:white;font-weight:bold;border:none;">Đăng nhập</button>
        <button onclick="register()" style="background:none;border:none;color:#0084ff;margin-top:15px;">Tạo tài khoản</button>
    </div>

    <div id="main-app" class="hidden">
        <div class="header">
            <div style="width:36px;"></div>
            <h1 id="tab-title">Đoạn chat</h1>
            <button class="circle-btn" onclick="toggleMainSettings()">⚙️</button>
        </div>

        <div id="settings-main" class="overlay-box hidden">
            <div style="display:flex; align-items:center; margin-bottom:15px;">
                <div class="avatar" style="width:40px; height:40px;" id="my-ava">?</div>
                <b id="my-name"></b>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <span>Trạng thái hoạt động</span>
                <label class="switch"><input type="checkbox" id="act-toggle" checked onchange="updateActiveStatus(this.checked)"><span class="slider"></span></label>
            </div>
            <button style="width:100%;background:#3a3b3c;border:none;color:#ff4444;padding:10px;border-radius:8px;" onclick="logout()">Đăng xuất</button>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('chats')">ĐOẠN CHAT</div>
            <div class="tab" onclick="switchTab('find')">TÌM BẠN</div>
            <div class="tab" id="tab-req-btn" onclick="switchTab('reqs')">LỜI MỜI <span class="badge" id="req-count">0</span></div>
        </div>

        <div id="tab-chats" class="list-container"><div id="chat-list"></div></div>
        <div id="tab-find" class="list-container hidden">
            <div style="padding:16px;"><input type="text" id="search-friend" placeholder="Nhập @username..." onkeyup="secureSearch(this.value)" style="width:100%;background:#242526;border:none;padding:12px;border-radius:10px;color:white;outline:none;"></div>
            <div id="search-result"></div>
        </div>
        <div id="tab-reqs" class="list-container hidden"><div id="req-list"></div></div>
    </div>

    <div id="chat-window" class="hidden">
        <div class="header">
            <button style="background:none;border:none;color:var(--primary);font-size:24px;" onclick="closeChat()">❮</button>
            <b id="chat-with" style="flex:1; text-align:center; cursor:pointer;" onclick="toggleChatSettings()"></b>
            <button class="circle-btn" onclick="toggleChatSettings()">⋮</button>
        </div>

        <div id="settings-chat" class="overlay-box hidden">
            <button style="width:100%;background:#3a3b3c;border:none;color:white;padding:10px;border-radius:8px;margin-bottom:10px;text-align:left;" onclick="setNickname()">✏️ Đổi biệt danh</button>
            <b>Chọn màu chủ đề:</b>
            <div class="color-grid" id="color-picker"></div>
            <button style="width:100%;background:#3a3b3c;border:none;color:#ff4444;padding:10px;border-radius:8px;text-align:left;margin-top:10px;" onclick="removeFriend()">💔 Hủy kết bạn</button>
        </div>

        <div id="chat-box" class="messages"></div>
        <div id="rec-ui" class="rec-status hidden">🔴 Đang ghi: <span id="rec-time">0s</span></div>
        <div class="input-bar">
            <label style="font-size:22px;">📷<input type="file" class="hidden" accept="image/*" onchange="sendImg(this)"></label>
            <button id="rec-btn" style="font-size:22px;background:none;border:none;color:var(--primary);" onmousedown="startRec()" onmouseup="stopRec()" ontouchstart="startRec(event)" ontouchend="stopRec(event)">🎤</button>
            <input type="text" id="msg-input" placeholder="Aa" onkeypress="if(event.key==='Enter')sendText()">
            <button style="border:none;background:none;color:var(--primary);font-weight:bold;" onclick="sendText()">GỬI</button>
        </div>
    </div>

    <script>
        const conf = { databaseURL: "https://pz-chat-f22e1-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(conf);
        const rtdb = firebase.database();
        let me = localStorage.getItem('pz_user'), talkingTo = "", mRec, chunks = [], recInterval, finalSec = 0;

        const colors = ["#0084ff", "#44bec7", "#ffc300", "#fa3c4c", "#d696bb", "#6699cc", "#13cf13", "#ff7e29", "#e68585", "#7646ff", "#20cef5", "#67187a", "#ff5ca1", "#a695c7", "#00d2d3"];

        window.onload = () => {
            const picker = document.getElementById('color-picker');
            colors.forEach(c => {
                const dot = document.createElement('div');
                dot.className = 'color-dot';
                dot.style.background = c;
                dot.onclick = () => { rtdb.ref('settings/'+getRoomId()+'/color').set(c); toggleChatSettings(); };
                picker.appendChild(dot);
            });
            if(me) showApp();
        };

        function login() {
            const u = document.getElementById('u-name').value.trim(), p = document.getElementById('u-pass').value;
            if(!u || !p) return alert("Nhập đủ!");
            rtdb.ref('accounts/'+u.replace('@','')).once('value', s => {
                if(s.exists() && s.val().p === p) { localStorage.setItem('pz_user', u); location.reload(); }
                else alert("Sai thông tin!");
            });
        }

        function register() {
            const u = document.getElementById('u-name').value.trim(), p = document.getElementById('u-pass').value;
            if(!u || p.length < 4) return alert("Tên @ và Pass > 4 ký tự!");
            rtdb.ref('accounts/'+u.replace('@','')).set({ p: p, active: true }).then(() => alert("Xong! Hãy đăng nhập."));
        }

        function showApp() {
            document.getElementById('auth-box').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('my-name').innerText = me;
            document.getElementById('my-ava').innerText = me[1].toUpperCase();
            rtdb.ref('accounts/'+me.replace('@','')+'/active').set(true);
            loadChats(); loadRequests();
        }

        async function startRec(e) {
            if(e) e.preventDefault();
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mRec = new MediaRecorder(stream); chunks = []; finalSec = 0;
                document.getElementById('rec-ui').classList.remove('hidden');
                recInterval = setInterval(() => { finalSec++; document.getElementById('rec-time').innerText = finalSec+'s'; }, 1000);
                mRec.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };
                mRec.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/mp3' });
                    const reader = new FileReader();
                    reader.onloadend = () => { rtdb.ref('messages/'+getRoomId()).push({ s: me, voice: reader.result, duration: finalSec, time: Date.now() }); };
                    reader.readAsDataURL(blob);
                };
                mRec.start();
            } catch(err) { alert("Cần Mic!"); }
        }

        function stopRec(e) {
            if(e) e.preventDefault();
            if(mRec?.state !== "inactive") { mRec.stop(); clearInterval(recInterval); document.getElementById('rec-ui').classList.add('hidden'); }
        }

        function loadChats() {
            rtdb.ref('users/'+me.replace('@','')+'/friends').on('value', s => {
                const div = document.getElementById('chat-list'); div.innerHTML = "";
                s.forEach(c => {
                    const fid = c.key;
                    rtdb.ref('accounts/'+fid+'/active').on('value', act => {
                        const isOnline = act.val() ? 'is-online' : '';
                        rtdb.ref('settings/'+[me.replace('@',''),fid].sort().join('_')+'/nick_'+fid).on('value', nick => {
                            div.innerHTML += `<div class="chat-item ${isOnline}" onclick="openChat('@${fid}')"><div class="avatar">${fid[0].toUpperCase()}<div class="online-dot"></div></div><div class="chat-info"><b>${nick.val() || '@'+fid}</b></div></div>`;
                        });
                    });
                });
            });
        }

        function openChat(n) {
            talkingTo = n; document.getElementById('chat-window').classList.remove('hidden');
            const rid = getRoomId();
            rtdb.ref('settings/'+rid+'/color').on('value', c => { document.documentElement.style.setProperty('--primary', c.val() || '#0084ff'); });
            rtdb.ref('settings/'+rid+'/nick_'+n.replace('@','')).on('value', nick => { document.getElementById('chat-with').innerText = nick.val() || n; });
            rtdb.ref('messages/'+rid).off();
            rtdb.ref('messages/'+rid).on('value', s => {
                const b = document.getElementById('chat-box'); b.innerHTML = "";
                s.forEach(c => {
                    const d = c.val(), cls = d.s === me ? 'me' : 'them';
                    let cont = d.t ? `<div class="bubble">${d.t}</div>` : (d.img ? `<img src="${d.img}" style="width:100%;border-radius:15px;">` : `<div class="bubble" onclick="new Audio('${d.voice}').play()">▶️ Voice (${d.duration}s)</div>`);
                    b.innerHTML += `<div class="msg-row ${cls}">${cont}</div>`;
                });
                b.scrollTop = b.scrollHeight;
            });
        }

        function getRoomId() { return [me.replace('@',''), talkingTo.replace('@','')].sort().join('_'); }
        function sendText() { const i = document.getElementById('msg-input'); if(!i.value.trim()) return; rtdb.ref('messages/'+getRoomId()).push({ s: me, t: i.value, time: Date.now() }); i.value = ""; }
        function sendImg(input) { const reader = new FileReader(); reader.onload = e => rtdb.ref('messages/'+getRoomId()).push({ s: me, img: e.target.result, time: Date.now() }); reader.readAsDataURL(input.files[0]); }
        function setNickname() { const n = prompt("Nhập biệt danh:"); if(n) rtdb.ref('settings/'+getRoomId()+'/nick_'+talkingTo.replace('@','')).set(n); }
        function removeFriend() { if(confirm("Xóa bạn?")) { const f=talkingTo.replace('@',''), m=me.replace('@',''); rtdb.ref('users/'+m+'/friends/'+f).remove(); rtdb.ref('users/'+f+'/friends/'+m).remove(); closeChat(); } }
        async function secureSearch(v) { v = v.toLowerCase().trim(); const res = document.getElementById('search-result'); if(v.length < 2 || v === me) { res.innerHTML = ""; return; } const s = await rtdb.ref('accounts/'+v.replace('@','')).once('value'); if(s.exists()) res.innerHTML = `<div class="chat-item"><div class="avatar">${v[1].toUpperCase()}</div><div class="chat-info"><b>${v}</b></div><button class="circle-btn" style="background:var(--primary);width:auto;padding:0 15px;border-radius:8px;" onclick="sendRequest('${v}')">Kết bạn</button></div>`; }
        function sendRequest(n) { rtdb.ref('requests/'+n.replace('@','')+'/'+me.replace('@','')).set(true); alert("Đã gửi!"); }
        function loadRequests() { rtdb.ref('requests/'+me.replace('@','')).on('value', s => { const badge = document.getElementById('req-count'); const div = document.getElementById('req-list'); div.innerHTML = ""; let count = 0; s.forEach(c => { count++; div.innerHTML += `<div class="chat-item"><div class="avatar">${c.key[0].toUpperCase()}</div><div class="chat-info"><b>@${c.key}</b></div><button class="circle-btn" style="background:var(--primary);width:auto;padding:0 15px;border-radius:8px;" onclick="acceptFriend('${c.key}')">Duyệt</button></div>`; }); badge.innerText = count; document.getElementById('tab-req-btn').className = count > 0 ? 'tab has-notif' : 'tab'; }); }
        function acceptFriend(n) { rtdb.ref('users/'+me.replace('@','')+'/friends/'+n).set(true); rtdb.ref('users/'+n+'/friends/'+me.replace('@','')).set(true); rtdb.ref('requests/'+me.replace('@','')+'/'+n).remove(); }
        function updateActiveStatus(v) { rtdb.ref('accounts/'+me.replace('@','')+'/active').set(v); }
        function toggleMainSettings() { document.getElementById('settings-main').classList.toggle('hidden'); }
        function toggleChatSettings() { document.getElementById('settings-chat').classList.toggle('hidden'); }
        function switchTab(t) { document.querySelectorAll('.tab').forEach(e => e.classList.remove('active')); document.querySelectorAll('.list-container').forEach(e => e.classList.add('hidden')); const tabs = {chats:0, find:1, reqs:2}; document.querySelectorAll('.tab')[tabs[t]].classList.add('active'); document.getElementById('tab-'+t).classList.remove('hidden'); }
        function closeChat() { document.getElementById('chat-window').classList.add('hidden'); document.getElementById('settings-chat').classList.add('hidden'); }
        function logout() { rtdb.ref('accounts/'+me.replace('@','')+'/active').set(false); localStorage.removeItem('pz_user'); location.reload(); }
    </script>
</body>
</html>
