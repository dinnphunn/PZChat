<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PZ CHAT V4</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #a033ff; --bg: #000; --card: #1c1c1e; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; overflow: hidden; }
        .hidden { display: none !important; }
        input { background: #2c2c2e; border: 1px solid #3a3a3c; padding: 16px; border-radius: 12px; color: #fff; width: 100%; box-sizing: border-box; outline: none; margin-bottom: 12px; font-size: 16px; }
        .btn { background: var(--primary); color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; }
        .auth { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; padding: 40px; text-align: center; }
        .header { padding: 15px 20px; border-bottom: 1px solid #2c2c2e; display: flex; justify-content: space-between; align-items: center; background: #000; }
        .friend-item { padding: 15px; background: var(--card); border-radius: 15px; margin-bottom: 10px; display: flex; align-items: center; }
        #chat-window { position: fixed; inset: 0; background: #000; z-index: 900; display: flex; flex-direction: column; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 75%; font-size: 15px; }
        .msg.me { align-self: flex-end; background: var(--primary); border-bottom-right-radius: 4px; }
        .msg.them { align-self: flex-start; background: #2c2c2e; border-bottom-left-radius: 4px; }
        .input-area { padding: 10px 15px 35px; display: flex; gap: 10px; border-top: 1px solid #2c2c2e; background: #000; }
    </style>
</head>
<body>

    <div id="auth-box" class="auth">
        <h1 style="letter-spacing: 3px;">PZ CHAT</h1>
        <input type="text" id="u-name" placeholder="@username">
        <input type="password" id="u-pass" placeholder="Mật khẩu">
        <button class="btn" onclick="handleAuth()">ĐĂNG NHẬP</button>
    </div>

    <div id="main-app" class="hidden">
        <div class="header">
            <h2 id="display-me" style="margin:0; color: var(--primary);"></h2>
            <button onclick="logout()" style="background:none; border:none; color:#ff4444;">Thoát</button>
        </div>
        <div style="padding: 15px;">
            <input type="text" id="find-user" placeholder="Tìm @name..." onkeyup="search(this.value)">
            <div id="search-res"></div>
            <div id="list" style="margin-top: 20px;"></div>
        </div>
    </div>

    <div id="chat-window" class="hidden">
        <div class="header">
            <button onclick="closeChat()" style="background:none; border:none; color:var(--primary); font-size:22px;">❮</button>
            <b id="chat-with"></b>
            <div style="width:30px;"></div>
        </div>
        <div id="chat-box" class="chat-messages"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Aa..." onkeypress="if(event.key==='Enter')send()" style="margin:0;">
            <button onclick="send()" style="background:var(--primary); border:none; color:#fff; padding:0 20px; border-radius:12px;">Gửi</button>
        </div>
    </div>

    <script>
        const conf = { databaseURL: "https://pz-chat-f22e1-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(conf);
        const rtdb = firebase.database();
        
        let me = localStorage.getItem('pz_user');
        let talkingTo = "";

        // Yêu cầu quyền thông báo ngay khi mở app
        if ("Notification" in window) {
            Notification.requestPermission();
        }

        if(me) showApp();

        async function handleAuth() {
            const user = document.getElementById('u-name').value.trim().toLowerCase();
            const pass = document.getElementById('u-pass').value.trim();
            if(!user.startsWith('@')) return alert("Phải có @ nhé!");
            
            const snapshot = await rtdb.ref('accounts/' + user.replace('@','')).once('value');
            const data = snapshot.val();

            if(data) {
                if(data.pass === pass) loginSuccess(user);
                else alert("Sai mật khẩu!");
            } else {
                await rtdb.ref('accounts/' + user.replace('@','')).set({ pass: pass });
                loginSuccess(user);
            }
        }

        function loginSuccess(user) {
            me = user;
            localStorage.setItem('pz_user', me);
            showApp();
        }

        function showApp() {
            document.getElementById('auth-box').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('display-me').innerText = me;
            loadFriends();
            listenForAllMessages();
        }

        function logout() {
            localStorage.removeItem('pz_user');
            location.reload();
        }

        // Lắng nghe thông báo tin nhắn mới
        function listenForAllMessages() {
            rtdb.ref('messages').on('child_added', (snapshot) => {
                const chatId = snapshot.key;
                if (chatId.includes(me.replace('@',''))) {
                    rtdb.ref('messages/' + chatId).limitToLast(1).on('child_added', (msgSnap) => {
                        const msg = msgSnap.val();
                        if (msg.s !== me && talkingTo !== msg.s) {
                            showNotification(msg.s, msg.t);
                        }
                    });
                }
            });
        }

        function showNotification(from, text) {
            if (Notification.permission === "granted") {
                new Notification("PZ CHAT: " + from, { body: text });
            }
        }

        function search(v) {
            v = v.toLowerCase();
            if(v.length < 2 || v === me) return;
            document.getElementById('search-res').innerHTML = `<button class="btn" style="padding:10px; margin-top:5px;" onclick="addFriend('${v}')">Thêm bạn ${v}</button>`;
        }

        function addFriend(n) {
            rtdb.ref('users/'+me.replace('@','')+'/friends/'+n.replace('@','')).set(true);
            rtdb.ref('users/'+n.replace('@','')+'/friends/'+me.replace('@','')).set(true);
            document.getElementById('find-user').value = "";
            document.getElementById('search-res').innerHTML = "";
        }

        function loadFriends() {
            rtdb.ref('users/'+me.replace('@','')+'/friends').on('value', s => {
                const div = document.getElementById('list'); 
                div.innerHTML = "<h4>Bạn bè:</h4>";
                s.forEach(c => {
                    div.innerHTML += `<div class="friend-item" onclick="openChat('@${c.key}')"><b>@${c.key}</b></div>`;
                });
            });
        }

        function openChat(n) {
            talkingTo = n;
            document.getElementById('chat-with').innerText = n;
            document.getElementById('chat-window').classList.remove('hidden');
            const id = [me.replace('@',''), talkingTo.replace('@','')].sort().join('_');
            rtdb.ref('messages/' + id).on('value', s => {
                const b = document.getElementById('chat-box'); b.innerHTML = "";
                s.forEach(c => {
                    const d = c.val();
                    b.innerHTML += `<div class="msg ${d.s===me?'me':'them'}">${d.t}</div>`;
                });
                b.scrollTop = b.scrollHeight;
            });
        }

        function send() {
            const t = document.getElementById('msg-input').value;
            if(!t) return;
            const id = [me.replace('@',''), talkingTo.replace('@','')].sort().join('_');
            rtdb.ref('messages/' + id).push({ s: me, t: t });
            document.getElementById('msg-input').value = "";
        }

        function closeChat() { 
            talkingTo = "";
            document.getElementById('chat-window').classList.add('hidden'); 
        }
    </script>
</body>
</html>
